<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyecto Nataly ❤️</title>

<style>

/* INTRO FUTURISTA */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#050510;
color:#00ffee;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
}

.terminal{
font-size:22px;
}

.terminal p{
margin:10px;
}

.particula{
position:absolute;
width:2px;
height:2px;
background:#00ffee;
opacity:0.6;
animation:subirParticula 8s linear infinite;
}

@keyframes subirParticula{
from{transform:translateY(0)}
to{transform:translateY(-100vh)}
}

/* PROGRAMA PRINCIPAL */

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:50px;
color:white;
margin-top:70px;
animation:latido 1.5s infinite;
}

@keyframes latido{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin:10px;
}

button:hover{
background:#ff1e4d;
}

#carta{
opacity:0;
margin-top:30px;
font-size:22px;
color:white;
transition:1s;
width:70%;
margin:auto;
min-height:160px;
}

#sorpresa{
margin-top:20px;
font-size:26px;
color:white;
}

/* ESTRELLAS */

.estrella{
position:absolute;
font-size:18px;
animation:brillo 2s infinite;
}

@keyframes brillo{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

/* ROSAS */

.rosa{
position:absolute;
top:-50px;
font-size:28px;
animation:caer linear forwards;
}

@keyframes caer{
to{
transform:translateY(110vh);
opacity:0;
}
}

/* CORAZONES */

.flotante{
position:absolute;
font-size:28px;
animation:subir 6s linear forwards;
}

@keyframes subir{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-800px);opacity:0}
}

/* ESCENA FINAL */

#final{
display:none;
margin-top:40px;
display:flex;
justify-content:center;
align-items:center;
gap:40px;
}

#poema{
width:250px;
background:white;
padding:20px;
border-radius:20px;
font-size:18px;
color:#444;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

#inspiracion{
width:250px;
background:white;
padding:20px;
border-radius:20px;
font-size:18px;
color:#444;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

#ositos img{
width:260px;
border-radius:20px;
}

</style>
</head>

<body>

<!-- INTRO FUTURISTA -->

<div id="intro">

<div class="terminal">
<p id="linea1"></p>
<p id="linea2"></p>
<p id="linea3"></p>
<p id="linea4"></p>
<p id="linea5"></p>
</div>

</div>

<!-- PROGRAMA -->

<h1>Nataly ❤️</h1>

<button onclick="abrirCarta()">💌 Abrir carta</button>
<button onclick="chocolate()">🍫 Abrir chocolate</button>

<div id="carta"></div>

<div id="sorpresa"></div>

<div id="final">

<div id="poema">

A veces la inspiración llega  
sin hacer ruido.<br><br>

Llega en forma de una sonrisa,  
de una conversación,  
o de una persona especial.

</div>

<div id="ositos">
<img id="gifOsitos" src="ositos.gif">
</div>

<div id="inspiracion">

Dicen que todo lo que se crea  
nace de una inspiración.<br><br>

Este pequeño programa  
también tiene la suya.<br><br>

Y esa inspiración eres tú.<br><br>

✨ <b>Att: Jhari</b>

</div>

</div>

<audio id="musica" loop>
<source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>

/* INTRO TEXTO */

function escribir(id,texto,velocidad){

let i=0

let intervalo=setInterval(function(){

if(i<texto.length){

document.getElementById(id).innerHTML+=texto.charAt(i)
i++

}else{

clearInterval(intervalo)

}

},velocidad)

}

setTimeout(()=>{escribir("linea1","Iniciando sistema...",60)},1000)
setTimeout(()=>{escribir("linea2","Escaneando entorno...",60)},3000)
setTimeout(()=>{escribir("linea3","Usuario detectado...",60)},5000)
setTimeout(()=>{escribir("linea4","Identidad confirmada: Nataly ❤️",60)},7000)
setTimeout(()=>{escribir("linea5","Iniciando proyecto Nataly...",60)},9000)

/* TERMINA INTRO Y EMPIEZA MUSICA */

setTimeout(()=>{

document.getElementById("intro").style.display="none"

let musica=document.getElementById("musica")
musica.volume=0.6
musica.play()

},13000)

/* PARTICULAS INTRO */

for(let i=0;i<60;i++){

let p=document.createElement("div")
p.className="particula"

p.style.left=Math.random()*window.innerWidth+"px"
p.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(p)

}

/* CARTA */

let texto=`Nataly, hoy es el Día de la Mujer 🌸

y quería sorprenderte con algo diferente.

Tal vez no sea el regalo perfecto,
pero está hecho con mucho cariño.

Tu sonrisa puede alegrar cualquier día
y tu forma de ser hace todo más bonito.

Gracias por ser una persona tan especial. 💖`

let i=0

function escribirCarta(){

let carta=document.getElementById("carta")

if(i<texto.length){

carta.innerHTML+=texto.charAt(i)
i++
setTimeout(escribirCarta,40)

}

}

function abrirCarta(){

let carta=document.getElementById("carta")
carta.style.opacity=1

escribirCarta()

}

/* BOTON CHOCOLATE */

function chocolate(){

let sorpresa=document.getElementById("sorpresa")
let contador=3

let intervalo=setInterval(function(){

sorpresa.innerHTML="Preparando sorpresa... "+contador+" 🍫"

contador--

if(contador<0){

clearInterval(intervalo)

sorpresa.innerHTML="🍫 Sorpresa preparada"

document.getElementById("final").style.display="flex"

for(let i=0;i<30;i++){
setTimeout(crearFlotante,i*80)
}

}

},1000)

}

/* GIFS ALTERNANDO */

let gifs=["ositos.gif","cachetitos.gif"]
let indiceGif=0

function cambiarGif(){

indiceGif++

if(indiceGif>=gifs.length){
indiceGif=0
}

document.getElementById("gifOsitos").src=gifs[indiceGif]

}

setInterval(cambiarGif,5000)

/* CORAZONES */

function crearFlotante(){

let elementos=["❤️","✨"]

let e=document.createElement("div")

e.className="flotante"
e.innerHTML=elementos[Math.floor(Math.random()*elementos.length)]

e.style.left=Math.random()*window.innerWidth+"px"
e.style.top=window.innerHeight+"px"

document.body.appendChild(e)

setTimeout(()=>{e.remove()},6000)

}

/* ESTRELLAS */

for(let i=0;i<25;i++){

let e=document.createElement("div")

e.className="estrella"
e.innerHTML="✨"

e.style.left=Math.random()*window.innerWidth+"px"
e.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(e)

}

/* ROSAS */

function crearRosa(){

let r=document.createElement("div")

r.className="rosa"
r.innerHTML="🌹"

r.style.left=Math.random()*window.innerWidth+"px"
r.style.animationDuration=(Math.random()*4+6)+"s"

document.body.appendChild(r)

setTimeout(()=>r.remove(),10000)

}

setInterval(crearRosa,1200)

</script>

</body>
</html>
